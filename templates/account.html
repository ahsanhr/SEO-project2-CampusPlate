{% extends "layout.html" %}
{% block content %}
<h1 id="welcome-heading">
    Welcome back, <span id="username-display"></span>!
</h1>
<h2>Your current goals: </h2>
<ul>
    <li>Calories: <span id="user-calories-display"></span></li>
    <li>Protein: <span id="user-protein-display"></span></li>
    <li>Fats: <span id="user-fats-display"></span></li>
    <li>Carbohydrates: <span id="user-carbs-display"></span></li>
</ul>
<h3>Have updated goals? Submit them below!</h3>
<label>How would you like to set your goals?</label>
<select id="select-method">
    <option id="direct-input" value="direct">Enter macros directly</option>
    <option id="calculate-input" value="calculated">Calculate them for me, please!</option>
</select>
<form id="goals-form">
    <div id = "direct-form" style="display: block;">
        <div id="form-group">
            <label>Calories: </label>
            <input type="number" id="goal-calories" required>
        </div>
        <div id="form-group">
            <label>Protein: </label>
            <input type="number" id="goal-protein" required>
        </div>
        <div id="form-group">
            <label>Fats: </label>
            <input type="number" id="goal-fats" required>
        </div>
        <div id="form-group">
            <label>Carbohydrates: </label>
            <input type="number" id="goal-carbs" required>
        </div>
    </div>
    <div id="calculate-form" style="display: none;">
        <div class="form-group">
            <label>Age: </label>
            <input type="number" id="calc-age" class="form-control">
        </div>
        <div class="form-group">
            <label>Height (cm): </label>
            <input type="number" id="calc-height" class="form-control">
        </div>
        <div class="form-group">
            <label>Weight (lbs): </label>
            <input type="number" id="calc-weight" class="form-control">
        </div>
        <div class="form-group">
            <label>Sex: </label>
            <select id="calc-sex" class="form-control">
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>
        <div class="form-group">
            <label>Activity Level: </label>
            <select id="calc-activity" class="form-control">
                <option value="sedentary">Sedentary</option>
                <option value="light">Light</option>
                <option value="moderate" selected>Moderate</option>
                <option value="active">Active</option>
                <option value="very_active">Very Active</option>
            </select>
        </div>
        <div class="form-group">
            <label>Fitness Goal: </label>
            <select id="calc-goal" class="form-control">
                <option value="cut">Cut (Lose Weight)</option>
                <option value="maintain" selected>Maintain</option>
                <option value="bulk">Bulk (Gain Weight)</option>
            </select>
        </div>
    </div>
</form>
<button type="button" id="submit-goals-button">Submit</button>

{% endblock content %}
