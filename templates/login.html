{% extends "layout.html" %}
{% block content %}
    <h1>Login</h1>
    <form id="login-form">
        <div id="form-group">
            <label>Email </label>
            <input type="text" id="login-email" required>
        </div>
        <div id="form-group">
            <label>Password </label>
            <input type="text" id="login-password" required>
        </div>
        <button type="submit" id="login-button">Login</button>

    </form>

{% endblock content %}
